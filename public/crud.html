<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD Usuarios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body { background:#d5dbe3; }

  /* NAV */
  .navbar { background:#0d1b2a; }
  .navbar-brand { color:#fff !important; }

  /* CARDS */
  .card {
    border: none;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  }

  /* TABLE */
  table thead {
    background:#0d1b2a;
    color:#fff;
  }

  table tbody tr:hover {
    background:#cad4de;
    transition:0.2s;
  }

  /* BOTONES */
  .btn-edit { background:#0d6efd; color:#fff; }
  .btn-delete { background:#dc3545; color:#fff; }

  /* TOAST (usando tu función) */
  #toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #0d6efd;
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    opacity: 0;
    transition: 0.3s;
    z-index: 9999;
  }

  #toast.show {
    opacity: 1;
  }
</style>
</head>

<body>

<div id="toast"></div>

<nav class="navbar mb-4">
  <div class="container">
    <span class="navbar-brand">CRUD Usuarios</span>
  </div>
</nav>

<div class="container">

  <!-- FORM -->
  <div class="card p-4 mb-4">
    <h5 id="form-title">Nuevo usuario</h5>

    <div class="row g-2">
      <div class="col-md-4">
        <input id="inp-nombre" class="form-control" placeholder="Nombre">
      </div>
      <div class="col-md-4">
        <input id="inp-email" class="form-control" placeholder="Email">
      </div>
      <div class="col-md-4">
        <input id="inp-tel" class="form-control" placeholder="Teléfono">
      </div>
    </div>

    <div class="mt-3">
      <button class="btn btn-primary" onclick="guardar()">Guardar</button>
      <button class="btn btn-secondary" onclick="cancelarEdicion()">Cancelar</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card p-4">
    <div class="d-flex justify-content-between mb-2">
      <h5>Usuarios</h5>
      <span class="badge bg-primary" id="user-count">0</span>
    </div>

    <table class="table table-hover">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla-body">
        <tr><td colspan="5" class="text-center">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- FOOTER -->
  <p class="text-center mt-4 text-muted">
    Trabajando con 
    <img src="https://www.postgresql.org/media/img/about/press/elephant.png" width="25">
    PostgreSQL (pgAdmin)
  </p>

</div>

<!-- TU SCRIPT ORIGINAL SIN CAMBIOS -->
<script>
  const API = '/api/usuarios';
  let editando = null;

  function toast(msg, tipo = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${tipo}`;
    setTimeout(() => t.className = '', 2800);
  }

  async function cargar() {
    try {
      const res = await fetch(API);
      const usuarios = await res.json();
      document.getElementById('user-count').textContent = usuarios.length;
      const tbody = document.getElementById('tabla-body');

      if (usuarios.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center">No hay usuarios</td></tr>`;
        return;
      }

      tbody.innerHTML = usuarios.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.nombre}</td>
          <td>${u.email}</td>
          <td>${u.telefono || '-'}</td>
          <td>
            <button class="btn btn-sm btn-edit" onclick="editar(${u.id}, '${esc(u.nombre)}', '${esc(u.email)}', '${esc(u.telefono || '')}')">Editar</button>
            <button class="btn btn-sm btn-delete" onclick="eliminar(${u.id})">Eliminar</button>
          </td>
        </tr>
      `).join('');
    } catch {
      toast('Error al cargar usuarios', 'error');
    }
  }

  function esc(s) { return s.replace(/'/g, "\\'"); }

  async function guardar() {
    const nombre   = document.getElementById('inp-nombre').value.trim();
    const email    = document.getElementById('inp-email').value.trim();
    const telefono = document.getElementById('inp-tel').value.trim();

    if (!nombre || !email) { toast('Nombre y email son requeridos', 'error'); return; }

    const body = JSON.stringify({ nombre, email, telefono });

    try {
      let res;
      if (editando) {
        res = await fetch(`${API}/${editando}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body });
      } else {
        res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
      }

      if (!res.ok) { const e = await res.json(); toast(e.error || 'Error', 'error'); return; }

      toast(editando ? 'Usuario actualizado' : 'Usuario creado');
      cancelarEdicion();
      cargar();
    } catch {
      toast('Error de conexión', 'error');
    }
  }

  function editar(id, nombre, email, telefono) {
    editando = id;
    document.getElementById('inp-nombre').value  = nombre;
    document.getElementById('inp-email').value   = email;
    document.getElementById('inp-tel').value     = telefono;
    document.getElementById('form-title').textContent = `Editando usuario #${id}`;
  }

  function cancelarEdicion() {
    editando = null;
    document.getElementById('inp-nombre').value = '';
    document.getElementById('inp-email').value  = '';
    document.getElementById('inp-tel').value    = '';
    document.getElementById('form-title').textContent = 'Nuevo usuario';
  }

  async function eliminar(id) {
    if (!confirm(`¿Eliminar usuario #${id}?`)) return;
    try {
      const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
      if (!res.ok) { const e = await res.json(); toast(e.error || 'Error', 'error'); return; }
      toast('Usuario eliminado');
      cargar();
    } catch {
      toast('Error de conexión', 'error');
    }
  }

  cargar();
</script>

</body>
</html>
